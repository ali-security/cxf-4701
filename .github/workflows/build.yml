name: Build, Test and Upload CXF Bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: "-XX:MaxPermSize=192m -Xmx768M"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 7
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 7
          cache: maven

      - name: Build and run tests
        run: mvn -B -ntp install

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cxf-bundle
          path: osgi/bundle/all/target/cxf-bundle-2.7.18.jar
          retention-days: 1
          if-no-files-found: error
