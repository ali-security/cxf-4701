name: Build, Test and Upload CXF Bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: "-XX:MaxPermSize=256m -Xmx1024m -Dhttps.protocols=TLSv1.2 -Djavax.xml.accessExternalSchema=all -Djavax.xml.accessExternalDTD=all"
      CXF_CODEGEN_JVM_ARGS: "-XX:MaxPermSize=256m -Xmx512m -Dhttps.protocols=TLSv1.2 -Djavax.xml.accessExternalSchema=all -Djavax.xml.accessExternalDTD=all"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 7
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 7
          cache: maven

      - name: Install Maven 3.8.8 (last version to run on JDK 7)
        run: |
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.8.8/binaries/apache-maven-3.8.8-bin.tar.gz -o /tmp/maven.tar.gz
          sudo tar -xzf /tmp/maven.tar.gz -C /opt
          echo "/opt/apache-maven-3.8.8/bin" >> "$GITHUB_PATH"

      - name: Verify Maven and Java versions
        run: mvn -v

      - name: Build and run tests
        run: |
          mvn -B -ntp \
            -Dcxf.codegenplugin.forkmode=false \
            -Dcxf.codegen.jvmArgs="$CXF_CODEGEN_JVM_ARGS" \
            -Dcxf.surefire.fork.vmargs="-ea -Djavax.xml.accessExternalSchema=all -Djavax.xml.accessExternalDTD=all -Dhttps.protocols=TLSv1.2" \
            -Dcxf.surefire.usefile=true \
            install

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cxf-bundle
          path: osgi/bundle/all/target/cxf-bundle-2.7.18.jar
          retention-days: 1
          if-no-files-found: error
